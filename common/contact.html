<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        .contact-info { background: #f9f9f9; padding: 20px; border-radius: 5px; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { background-color: #007BFF; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<h1>Contact Us</h1>

<div class="contact-info">
    <h3>Get in Touch</h3>
    <p>Have questions? We are here to help.</p>
    <p><strong>Email:</strong> [Your Support Email]</p>
    <p><strong>Phone:</strong> [Your Phone Number, optional]</p>
    <p><strong>Business Hours:</strong> Monday - Friday: 9:00 AM - 5:00 PM</p>
</div>

<h3>Send us a message</h3>
<form action="#" method="post">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" placeholder="Your Name" required>

    <label for="email">Email Address:</label>
    <input type="email" id="email" name="email" placeholder="Your Email" required>

    <label for="message">Message:</label>
    <textarea id="message" name="message" rows="5" placeholder="How can we help you?" required></textarea>

    <button type="submit">Send Message</button>
</form>

</body>
</html>
